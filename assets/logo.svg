<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGrad)"/>

  <!-- Central circle (hub) -->
  <circle cx="64" cy="64" r="16" fill="white" opacity="0.95"/>

  <!-- Sparkle/star in center -->
  <g fill="#7c3aed">
    <circle cx="64" cy="64" r="5"/>
    <rect x="62" y="54" width="4" height="20" rx="2"/>
    <rect x="54" y="62" width="20" height="4" rx="2"/>
  </g>

  <!-- Six nodes around (representing different AIs) -->
  <g fill="white" opacity="0.9">
    <!-- Top -->
    <circle cx="64" cy="28" r="10"/>
    <!-- Top right -->
    <circle cx="95" cy="46" r="10"/>
    <!-- Bottom right -->
    <circle cx="95" cy="82" r="10"/>
    <!-- Bottom -->
    <circle cx="64" cy="100" r="10"/>
    <!-- Bottom left -->
    <circle cx="33" cy="82" r="10"/>
    <!-- Top left -->
    <circle cx="33" cy="46" r="10"/>
  </g>

  <!-- Small AI symbols in nodes -->
  <g fill="#7c3aed" font-family="Arial, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">
    <text x="64" y="32">AI</text>
    <text x="95" y="50">AI</text>
    <text x="95" y="86">AI</text>
    <text x="64" y="104">AI</text>
    <text x="33" y="86">AI</text>
    <text x="33" y="50">AI</text>
  </g>

  <!-- Connection lines -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="64" y1="48" x2="64" y2="38"/>
    <line x1="78" y1="54" x2="86" y2="50"/>
    <line x1="78" y1="74" x2="86" y2="78"/>
    <line x1="64" y1="80" x2="64" y2="90"/>
    <line x1="50" y1="74" x2="42" y2="78"/>
    <line x1="50" y1="54" x2="42" y2="50"/>
  </g>
</svg>