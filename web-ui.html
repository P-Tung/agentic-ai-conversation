<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Council of AI</title>
    <!-- Bulma CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="lucide.min.js"></script>
  </head>
  <body class="is-clipped">
    <div id="app-container" class="is-flex is-flex-direction-row" style="height: 100vh; width: 100vw; overflow: hidden;">

      <!-- Sidebar Overlay (Mobile) -->
      <div id="sidebar-overlay" class="is-hidden-desktop" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; display: none;"></div>

      <!-- Sidebar -->
      <aside id="sidebar" class="is-flex is-flex-direction-column border-right transition-all" style="width: 320px; z-index: 40;">
        <div class="px-5 py-4 is-flex is-align-items-center is-justify-content-space-between border-bottom">
          <h1 class="title is-5 mb-0 is-flex is-align-items-center gap-2">
            <i data-lucide="sparkles" class="has-text-primary"></i>
            <span>Agentic AI</span>
          </h1>
          <button id="close-sidebar" class="button is-ghost is-small is-hidden-desktop" title="Close Sidebar">
            <i data-lucide="panel-left-close"></i>
          </button>
        </div>

        <div class="p-5 is-flex-grow-1 is-overflow-y-auto no-scrollbar">
          <!-- Extension Status & Check All -->
          <div class="is-flex is-align-items-center is-justify-content-space-between mb-5">
            <div class="is-flex is-align-items-center gap-3">
              <button id="scan-tabs-btn" class="button is-small is-light is-rounded transition-all" title="Scan for AI Tabs">
                <i data-lucide="refresh-cw"></i>
              </button>
              <div id="ext-status-dot" class="status-dot" title="Extension Status"></div>
            </div>
            
            <button id="check-all-ready-btn" class="button is-ghost is-small is-uppercase has-text-weight-bold is-size-7 tracking-wider">
              <span id="check-all-text">Check all ready</span>
              <span id="check-all-checkbox" class="ml-2 border rounded" style="width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center;"></span>
            </button>
          </div>

          <!-- Tabs List -->
          <div id="tabs-list" class="mb-6">
            <!-- Dynamic items -->
          </div>
          <p id="no-tabs-msg" class="is-size-7 has-text-centered is-italic has-text-grey-light mb-6 is-hidden">
            No AI tabs found.<br>Open ChatGPT, Claude, Gemini, Grok, or Perplexity.
          </p>

          <!-- Configuration Menu -->
          <div class="menu">
            <!-- <p class="menu-label is-uppercase is-size-7 has-text-weight-bold tracking-wider mb-3">
              <i data-lucide="settings" class="is-size-7 mr-1"></i> Mode
            </p>
            <div id="mode-toggle" class="buttons has-addons mb-5">
              <button id="council-mode-btn" class="button is-small is-flex-grow-1 is-selected is-primary">Council</button>
              <button id="debate-mode-btn" class="button is-small is-flex-grow-1">Debate</button>
            </div>

            <div id="debate-config-section" class="is-hidden mb-5">
              <div class="field mb-4">
                <label class="label is-size-7 is-flex is-justify-content-space-between">
                  <span>Max Rounds</span>
                  <span id="max-rounds-value" class="has-text-primary">7</span>
                </label>
                <div class="control">
                  <input id="max-rounds-slider" class="slider is-fullwidth is-primary is-small" step="1" min="1" max="100" value="7" type="range">
                </div>
              </div>
              <div class="field mb-4">
                <label class="label is-size-7 is-flex is-justify-content-space-between">
                  <span>Max Debate Turns</span>
                  <span id="max-debate-turns-value" class="has-text-primary">5</span>
                </label>
                <div class="control">
                  <input id="max-debate-turns-slider" class="slider is-fullwidth is-primary is-small" step="1" min="1" max="100" value="5" type="range">
                </div>
              </div>
            </div> -->

            <div id="settings-section">
              <p class="menu-label is-uppercase is-size-7 has-text-weight-bold tracking-wider mb-2">Settings</p>
              <div id="response-timeout-section" class="field">
                <label class="label is-size-7 is-flex is-justify-content-space-between">
                  <span>Response Timeout</span>
                  <span><span id="response-timeout-value" class="has-text-primary">30</span><span class="has-text-grey-light">s</span></span>
                </label>
                <div class="control">
                  <input id="response-timeout-slider" class="slider is-fullwidth is-primary is-small" step="5" min="5" max="120" value="30" type="range">
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="is-flex is-flex-direction-column is-flex-grow-1 is-min-width-0">
        <!-- Header -->
        <header class="px-4 py-2 border-bottom is-flex is-align-items-center is-justify-content-space-between bg-white-opacity">
          <div class="is-flex is-align-items-center gap-3">
            <button id="open-sidebar" class="button is-ghost is-small transition-all" title="Open Sidebar">
              <i data-lucide="panel-left-open"></i>
            </button>
            <h2 class="is-size-7 is-uppercase has-text-weight-bold tracking-widest has-text-grey">Council of AI</h2>
          </div>
          <div class="buttons">
            <button id="clear-chat" class="button is-ghost is-small has-text-grey" title="Clear Conversation">
              <i data-lucide="trash-2"></i>
            </button>
            <button id="toggle-theme" class="button is-ghost is-small has-text-grey">
              <i id="theme-icon" data-lucide="sun"></i>
            </button>
          </div>
        </header>

        <!-- Minimized Area -->
        <div id="minimized-row" class="px-5 py-3 is-flex is-align-items-center is-justify-content-flex-end gap-4 is-hidden is-overflow-x-auto no-scrollbar border-bottom">
          <div id="minimized-tray-container" class="is-flex is-align-items-center gap-3"></div>
        </div>

        <!-- Sessions Grid -->
        <div id="sessions-container" class="is-flex-grow-1 is-overflow-hidden p-4 grid gap-4 bg-light-opacity">
          <div id="empty-state" class="is-flex is-flex-direction-column is-align-items-center is-justify-content-center h-full has-text-centered p-6 is-user-select-none">
            <div class="box is-shadowless bg-transparent">
              <i data-lucide="sparkles" class="is-size-1 has-text-grey-lighter mb-4"></i>
              <p class="has-text-weight-semibold has-text-grey">No AI members selected</p>
              <p class="is-size-7 has-text-grey-light mb-2">Open the sidebar and scan for AI tabs, then select members to start.</p>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="p-5 border-top">
          <form id="chat-form" class="is-flex is-align-items-end gap-3">
            <div class="control is-flex-grow-1 bg-light-opacity rounded-xl border p-1 focus-within-primary transition-all">
              <textarea id="chat-input" class="textarea is-shadowless is-borderless has-fixed-size px-4 py-2 is-size-6 no-scrollbar" placeholder="Ask the council..." rows="1" style="min-height: 48px; max-height: 200px; background: transparent; box-shadow: none;"></textarea>
            </div>
            <button id="send-button" type="submit" disabled class="button is-primary is-rounded h-[48px] px-5 shadow-sm transition-all hover-translate-y">
              <i data-lucide="send"></i>
            </button>
          </form>
          <div class="has-text-centered mt-3">
            <span class="is-size-7 has-text-grey-light">Messages broadcasted to all active AI members via extension bridge.</span>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="platforms.js"></script>
    <script src="syntax-highlight.js"></script>
    <script src="script.js"></script>
  </body>
</html>
